name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tools
        run: python -m pip install --upgrade pip && python -m pip install build mypy==1.10.0 pytest==8.3.4 ruff==0.4.8 twine

      - name: Run tests
        run: python -m pytest -q

      - name: Lint
        run: python -m ruff check .

      - name: Format check
        run: python -m ruff format --check .

      - name: Type check
        run: python -m mypy osint_regex tests

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: python -m pip install --upgrade pip && python -m pip install build mypy==1.10.0 pytest==8.3.4 ruff==0.4.8 twine

      - name: Build distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Verify wheel install
        run: python -m pip install dist/*.whl && python -c "import osint_regex as osreg; print(osreg.__version__)"
